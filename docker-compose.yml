services:
  ollama:
    image: ollama/ollama:latest
    container_name: myai-ollama

    ports:
      - "11434:11434"

    environment:
      OLLAMA_MODELS: /models

    volumes:
      - ./data/ollama:/root/.ollama
      - ./models/ollama:/models

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - myai-network

  postgres:
    image: postgres:17
    container_name: myai-postgres

    environment:
      POSTGRES_DB: myai
      POSTGRES_USER: myai
      POSTGRES_PASSWORD: myai123

    ports:
      - "5432:5432"

    volumes:
      - ./data/postgres:/var/lib/postgresql/data

    restart: unless-stopped

    networks:
      - myai-network

networks:
  myai-network:
    driver: bridge